<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Question Manager</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        nav { background: #1a1a1a; padding: 10px 20px; display: flex; gap: 20px; border-bottom: 1px solid #333; }
        nav a { color: #888; text-decoration: none; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
        nav a.active { color: #86bc25; border-bottom: 2px solid #86bc25; padding-bottom: 5px; }
        
        .container { flex: 1; padding: 30px; overflow-y: auto; max-width: 900px; margin: auto; width: 100%; box-sizing: border-box; }
        .card { background: #111; padding: 20px; border-radius: 4px; border: 1px solid #333; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; box-sizing: border-box; }
        button { padding: 10px 20px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-green { background: #86bc25; color: #000; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        td, th { padding: 10px; border-bottom: 1px solid #222; text-align: left; font-size: 0.8rem; }
        .btn-sm { padding: 5px 10px; font-size: 0.7rem; margin-right: 5px; background: #333; color: #ccc; }
    </style>
</head>
<body>
    <nav>
        <a href="facilitator.html">Facilitator Dashboard</a>
        <a href="manager.html" class="active">Question Manager</a>
    </nav>

    <div class="container">
        <h2>Question Manager</h2>
        <div class="card">
            <input type="hidden" id="edit-idx" value="-1">
            <label>Market Challenge (Category)</label><input type="text" id="in-cat">
            <label>Focus Area (Sub-Category)</label><input type="text" id="in-sub">
            <label>Question Text</label><textarea id="in-text" rows="2"></textarea>
            <button class="btn-green" onclick="saveToLocal()">Update List</button>
            <button onclick="reset()">Clear Form</button>
        </div>
        <div class="card">
            <table>
                <thead><tr><th>Category</th><th>Focus</th><th>Question</th><th>Actions</th></tr></thead>
                <tbody id="q-body"></tbody>
            </table>
            <button class="btn-green" style="width:100%; margin-top:20px; padding:20px;" onclick="syncToGoogle()">SAVE ALL TO GOOGLE SHEETS</button>
        </div>
    </div>
<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzzd63iRBiIqlkEuFevIsQXy73oYLvJX2JhSwwrsLfCP-hkAWfdZ862eGa1CMD9YBnB3A/exec";
    let questions = [];

    async function load() {
        try {
            const r = await fetch(`${SCRIPT_URL}?get=questions`, { redirect: 'follow' });
            questions = await r.json();
            render();
        } catch(e) { console.log("Fresh sheet."); }
    }
    function render() {
        document.getElementById('q-body').innerHTML = questions.map((q, i) => 
            `<tr><td>${q.category}</td><td>${q.sub}</td><td>${q.text}</td>
            <td style="white-space:nowrap"><button class="btn-sm" onclick="edit(${i})">Edit</button><button class="btn-sm" style="color:#ff4d4d" onclick="del(${i})">Del</button></td></tr>`).join('');
    }
    function edit(i) {
        document.getElementById('edit-idx').value = i;
        document.getElementById('in-cat').value = questions[i].category;
        document.getElementById('in-sub').value = questions[i].sub;
        document.getElementById('in-text').value = questions[i].text;
        window.scrollTo(0,0);
    }
    function del(i) { questions.splice(i, 1); render(); }
    function saveToLocal() {
        const i = parseInt(document.getElementById('edit-idx').value);
        const q = { category: document.getElementById('in-cat').value, sub: document.getElementById('in-sub').value, text: document.getElementById('in-text').value };
        if(i === -1) questions.push(q); else questions[i] = q;
        render(); reset();
    }
    function reset() { document.getElementById('edit-idx').value = "-1"; document.getElementById('in-cat').value = ""; document.getElementById('in-sub').value = ""; document.getElementById('in-text').value = ""; }
    
    function syncToGoogle() {
        if(!confirm("Push changes to Cloud?")) return;
        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "updateQuestions", data: questions }) });
        alert("Updating Database... Please wait 3 seconds before refreshing.");
        setTimeout(() => location.reload(), 3000);
    }
    load();
</script>
</body>
</html>
